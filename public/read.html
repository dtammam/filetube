<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Read - FileTube</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#cc0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FileTube">
  <link rel="preload" href="/fonts/roboto.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
  <!-- v1.37.1 hotfix: this page's styles moved to /css/style.css -- the
       SPA router swaps only #view-root, so page-local <head> styles were
       LOST on in-app navigation (the reader rendered unstyled when opened
       from the Books page). Shared stylesheet = styled on every path. -->
</head>
<body>
  <header>
    <div class="header-left">
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu"><i class="icon-menu"></i></button>
      <a href="/" class="logo">File<span class="tube">Tube</span></a>
    </div>
    <div class="header-search">
      <div class="search-form">
        <input type="text" id="search-input" class="search-input" placeholder="Search your files..." />
        <button id="search-btn" class="search-btn">Search</button>
      </div>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle light or dark mode"><i class="icon-moon"></i></button>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-section">
        <a href="/" class="sidebar-item">
          <i class="icon-home"></i> Home
        </a>
        <a href="/setup.html" class="sidebar-item">
          <i class="icon-cog"></i> Library Settings
        </a>
        <!-- Subscriptions/Books links injected by common.js probes. -->
      </nav>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Playlists (Folders)</div>
        <div id="sidebar-folders-list"></div>
      </div>
    </aside>

    <main class="main-content" id="main-content">
      <div id="view-root" data-view="read">
        <div class="reader-chassis" id="reader-chassis">
          <div class="reader-topbar">
            <a href="/books" class="btn btn-sm" id="reader-back-btn" aria-label="Back to books">&#8592;</a>
            <div class="reader-title" id="reader-title">Loading&hellip;</div>
            <button class="btn btn-sm" id="reader-toc-btn" type="button" aria-label="Table of contents">Contents</button>
            <button class="btn btn-sm" id="reader-settings-btn" type="button" aria-label="Reader settings">Aa</button>
            <!-- v1.38.0 TTS: shown by read.js only when GET /api/books/tts/config
                 reports an engine is configured (opt-in like yt-dlp). -->
            <button class="btn btn-sm" id="reader-listen-btn" type="button" aria-label="Listen from here" hidden>Listen</button>
          </div>
          <div class="reader-content theme-paper" id="reader-content">
            <div id="reader-pane"></div>
            <button class="reader-tap-nav reader-tap-prev" id="reader-tap-prev" aria-label="Previous page"></button>
            <button class="reader-tap-nav reader-tap-next" id="reader-tap-next" aria-label="Next page"></button>
            <div class="reader-status" id="reader-status">Opening book&hellip;</div>
            <div class="reader-drawer" id="reader-toc-drawer" hidden>
              <h3>Contents</h3>
              <div id="reader-toc-list"></div>
            </div>
            <div class="reader-drawer" id="reader-settings-drawer" hidden>
              <h3>Reader settings</h3>
              <div class="reader-settings-row">
                <span>Font size</span>
                <span>
                  <button class="btn btn-sm" id="reader-font-smaller" type="button" aria-label="Smaller text">A-</button>
                  <button class="btn btn-sm" id="reader-font-larger" type="button" aria-label="Larger text">A+</button>
                </span>
              </div>
              <div class="reader-settings-row">
                <span>Theme</span>
                <span>
                  <button class="btn btn-sm" data-reader-theme="paper" type="button">Paper</button>
                  <button class="btn btn-sm" data-reader-theme="sepia" type="button">Sepia</button>
                  <button class="btn btn-sm" data-reader-theme="night" type="button">Night</button>
                </span>
              </div>
            </div>
          </div>
          <div class="reader-bottombar">
            <div class="reader-progress-track"><div class="reader-progress-fill" id="reader-progress-fill"></div></div>
            <span class="reader-percent" id="reader-percent">0%</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
    <a href="/" class="bottom-nav-item" data-nav="home">
      <i class="icon-home"></i>
      <span class="bottom-nav-label">Home</span>
    </a>
    <button type="button" class="bottom-nav-item" data-nav="playlists" id="nav-playlists-btn">
      <i class="icon-folder"></i>
      <span class="bottom-nav-label">Playlists</span>
    </button>
    <button type="button" class="bottom-nav-item" data-nav="theme" id="nav-theme-toggle">
      <i class="icon-moon"></i>
      <span class="bottom-nav-label">Dark</span>
    </button>
    <a href="/setup.html" class="bottom-nav-item" data-nav="settings">
      <i class="icon-cog"></i>
      <span class="bottom-nav-label">Settings</span>
    </a>
  </nav>

  <div class="playlists-sheet-backdrop" id="playlists-backdrop" hidden></div>
  <aside class="playlists-sheet" id="playlists-sheet" hidden aria-label="Playlists">
    <div class="playlists-sheet-header">
      <span>Playlists</span>
      <button type="button" class="playlists-sheet-close" id="playlists-close" aria-label="Close">&times;</button>
    </div>
    <div class="playlists-sheet-list" id="playlists-sheet-list"></div>
  </aside>

  <!-- v1.38.0 TTS "Listen from Here": the player host, so read.js can dock the
       battle-won background-audio player (hidden <audio> + MediaSession) for a
       book chapter's synthesized audio. Byte-identical to setup/watch's host
       so the shared player.js ensureHost() mounts here unchanged.
       v1.38.3: #player-slot is the FULL mount point player.load() needs before
       we dock() -- load(no slot) is a no-op (mountInSlot bails), so the host
       would never attach to the page. The host leaves this slot the instant we
       dock, so it stays empty. -->
  <div id="player-slot" class="reader-player-slot"></div>
  <div id="player-dock" hidden></div>
  <template id="player-host-template">
    <div class="player-container" id="player-wrapper">
      <div id="audio-bg-art" class="audio-bg-art"></div>
      <div id="art-play-glyph" class="art-play-glyph" aria-hidden="true"></div>
      <div id="resume-overlay" class="resume-overlay" style="display: none;">
        <h3>Resume Playback?</h3>
        <p>You watched this media up to <span id="resume-time-str">0:00</span>. Would you like to resume from there?</p>
        <div class="resume-actions">
          <button class="btn" id="resume-no-btn">Start from beginning</button>
          <button class="btn btn-primary" id="resume-yes-btn">Resume</button>
        </div>
      </div>
      <div id="transcode-overlay" class="resume-overlay" style="display: none;">
        <div class="transcode-spinner" id="transcode-spinner"></div>
        <h3 id="transcode-title">Preparing this video&hellip;</h3>
        <p id="transcode-message">FileTube is converting this file to a browser-friendly format. This only happens once &mdash; it'll start playing automatically when it's ready.</p>
      </div>
      <video id="media-player" preload="metadata" playsinline webkit-playsinline x5-playsinline style="display: none;">
        <track id="cc-track" kind="captions" srclang="en" label="English">
        Your browser does not support HTML5 video player.
      </video>
      <div id="speed-badge" class="speed-badge" style="display: none;">2× ▶▶</div>
      <div id="skip-controls" class="skip-controls" style="display: none;">
        <button type="button" class="skip-btn skip-back" id="skip-back-btn" aria-label="Rewind 15 seconds">
          <span class="skip-arrow">«</span><span class="skip-num">15</span>
        </button>
        <button type="button" class="skip-btn skip-forward" id="skip-fwd-btn" aria-label="Forward 15 seconds">
          <span class="skip-num">15</span><span class="skip-arrow">»</span>
        </button>
        <div class="skip-ripple skip-ripple-left" id="skip-ripple-left">« 15s</div>
        <div class="skip-ripple skip-ripple-right" id="skip-ripple-right">15s »</div>
      </div>
      <div id="audio-visualizer" class="audio-player-visual" style="display: none;">
        <div class="audio-vinyl" id="vinyl-disc"></div>
        <div class="audio-title" id="audio-visual-title">Audio Track Title</div>
        <div class="audio-subtitle" id="audio-visual-folder">Playlist Folder</div>
      </div>
      <div id="player-controls" class="player-controls">
        <button type="button" id="pp-btn" class="pc-btn pp-btn" aria-label="Play" aria-pressed="false">
          <span class="pp-icon-play" aria-hidden="true"></span>
          <span class="pp-icon-pause" aria-hidden="true"></span>
        </button>
        <span id="time-cur" class="pc-time">0:00</span>
        <input type="range" id="seek-bar" class="pc-range pc-seek" min="0" max="1" step="0.001" value="0" aria-label="Seek">
        <span id="time-dur" class="pc-time">0:00</span>
        <button type="button" id="mute-btn" class="pc-btn mute-btn" aria-label="Mute" aria-pressed="false">
          <span class="mute-icon-on" aria-hidden="true"></span>
          <span class="mute-icon-off" aria-hidden="true"></span>
        </button>
        <input type="range" id="vol-bar" class="pc-range pc-vol" min="0" max="1" step="0.01" value="1" aria-label="Volume">
        <button type="button" id="speed-btn" class="pc-btn speed-btn" aria-label="Playback speed">1×</button>
        <button type="button" id="fs-btn" class="pc-btn fs-btn" aria-label="Fullscreen">⛶</button>
        <button type="button" id="pip-btn" class="pc-btn pip-btn" aria-label="Picture in picture">⧉</button>
        <button type="button" id="cc-btn" class="pc-btn cc-btn" aria-label="Toggle captions" aria-pressed="false" style="display: none;">CC</button>
        <button type="button" id="chapters-btn" class="pc-btn chapters-btn" aria-label="Chapters" aria-expanded="false" style="display: none;">Ch</button>
        <div id="chapters-menu" class="chapters-menu" hidden></div>
      </div>
    </div>
  </template>

  <!-- Core view scripts (see index.html); read.js loaded directly here for
       progressive-enhancement hard loads; the reader's vendor libs
       (JSZip/epub.js or pdf.js) are fetched lazily by read.js itself per
       book format -- never by any other page. -->
  <script src="/js/common.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/watch.js"></script>
  <script src="/js/setup.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/books.js"></script>
  <script src="/js/read.js"></script>
</body>
</html>
