<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Books - FileTube</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#cc0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FileTube">
  <link rel="preload" href="/fonts/roboto.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* v1.37.0 books page -- era tokens only, no hardcoded colors (the
       subscriptions.html page-local-style precedent). Cover cards are
       PORTRAIT (2:3) unlike the 16:9 video cards, so they get their own
       grid rather than reusing .video-card's aspect machinery. */
    .books-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .books-toolbar h2 { margin: 0; }
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }
    .book-card {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .book-cover-link {
      display: block;
      aspect-ratio: 2 / 3;
      border-radius: 4px;
      overflow: hidden;
      background: var(--thumbnail-bg, #222);
      position: relative;
    }
    .book-cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .book-progress-track {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 4px;
      background: rgba(0, 0, 0, 0.5);
    }
    .book-progress-fill {
      height: 100%;
      background: var(--accent, #cc0000);
    }
    .book-title {
      margin-top: 6px;
      font-weight: bold;
      font-size: var(--fs-base);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .book-author {
      font-size: var(--fs-sm);
      opacity: 0.75;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .books-shelf-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .books-shelf-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border: 1px solid var(--border-color, #444);
      border-radius: 14px;
      font-size: var(--fs-sm);
      cursor: pointer;
      background: none;
      color: inherit;
    }
    .books-shelf-chip.active { background: var(--accent, #cc0000); color: #fff; border-color: transparent; }
    .books-shelf-pin-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: inherit;
      opacity: 0.7;
      padding: 0 2px;
      font-size: var(--fs-sm);
    }
    .books-shelf-pin-btn.pinned { opacity: 1; }
    .books-empty {
      opacity: 0.75;
      padding: 24px 0;
    }
    .books-section-title {
      margin: 18px 0 10px;
      font-size: var(--fs-lg);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu"><i class="icon-menu"></i></button>
      <a href="/" class="logo">File<span class="tube">Tube</span></a>
    </div>
    <div class="header-search">
      <div class="search-form">
        <input type="text" id="search-input" class="search-input" placeholder="Search your files..." />
        <button id="search-btn" class="search-btn">Search</button>
      </div>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle light or dark mode"><i class="icon-moon"></i></button>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-section">
        <a href="/" class="sidebar-item">
          <i class="icon-home"></i> Home
        </a>
        <a href="/setup.html" class="sidebar-item">
          <i class="icon-cog"></i> Library Settings
        </a>
        <!-- Subscriptions + Books sidebar links are injected by
             public/js/common.js's capability probes -- never hardcoded, so
             this shell behaves identically to every other page's. -->
      </nav>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Playlists (Folders)</div>
        <div id="sidebar-folders-list">
          <!-- Populated dynamically -->
        </div>
      </div>
    </aside>

    <main class="main-content" id="main-content">
      <!-- Per-view content boundary (FR-1, T1): the router swaps ONLY this
           node on in-app navigation -- see index.html's matching comment. -->
      <div id="view-root" data-view="books">
        <div class="books-toolbar">
          <h2>Books</h2>
          <div>
            <select id="books-sort-select" class="btn btn-sm" aria-label="Sort books">
              <option value="recent">Recently added</option>
              <option value="title-asc">Title A-Z</option>
              <option value="title-desc">Title Z-A</option>
              <option value="author">Author</option>
              <option value="recent-progress">Recently read</option>
            </select>
            <button class="btn btn-sm" id="books-scan-btn" type="button" title="Scan book folders now">
              <i class="icon-refresh"></i> Scan
            </button>
          </div>
        </div>

        <div class="books-shelf-chips" id="books-shelf-chips"><!-- folder chips + pin toggles --></div>

        <div id="books-continue-section" hidden>
          <h3 class="books-section-title">Continue reading</h3>
          <div class="books-grid" id="books-continue-grid"></div>
          <h3 class="books-section-title">All books</h3>
        </div>

        <div class="books-grid" id="books-grid">
          <!-- Populated by /js/books.js -->
        </div>
        <div class="books-empty" id="books-empty" hidden>
          No books yet. Add a book folder in <a href="/setup.html">Library Settings</a>, drop EPUB or PDF files in it, and scan.
        </div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
    <a href="/" class="bottom-nav-item" data-nav="home">
      <i class="icon-home"></i>
      <span class="bottom-nav-label">Home</span>
    </a>
    <button type="button" class="bottom-nav-item" data-nav="playlists" id="nav-playlists-btn">
      <i class="icon-folder"></i>
      <span class="bottom-nav-label">Playlists</span>
    </button>
    <button type="button" class="bottom-nav-item" data-nav="theme" id="nav-theme-toggle">
      <i class="icon-moon"></i>
      <span class="bottom-nav-label">Dark</span>
    </button>
    <a href="/setup.html" class="bottom-nav-item" data-nav="settings">
      <i class="icon-cog"></i>
      <span class="bottom-nav-label">Settings</span>
    </a>
    <!-- Subscriptions/Books bottom-nav items are injected by common.js. -->
  </nav>

  <div class="playlists-sheet-backdrop" id="playlists-backdrop" hidden></div>
  <aside class="playlists-sheet" id="playlists-sheet" hidden aria-label="Playlists">
    <div class="playlists-sheet-header">
      <span>Playlists</span>
      <button type="button" class="playlists-sheet-close" id="playlists-close" aria-label="Close">&times;</button>
    </div>
    <div class="playlists-sheet-list" id="playlists-sheet-list"></div>
  </aside>

  <!-- Core view scripts on every shell (FR-1, T1 -- see index.html's
       matching comment); books.js is loaded directly here because a hard
       load/deep link of THIS page needs it immediately (progressive
       enhancement), while every OTHER shell lazy-loads it via
       common.js's ensureViewScriptLoaded on first in-app navigation. -->
  <script src="/js/common.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/watch.js"></script>
  <script src="/js/setup.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/books.js"></script>
</body>
</html>
