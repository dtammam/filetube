<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FileTube - Broadcast Yourself (Your Files)</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#cc0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FileTube">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    /* FOUC guard: set era+mode+icons on <html> before first paint. Mirror of
       resolveTheme()/resolveIconSet() in /js/common.js — keep all three in
       sync (see the matching comment there). */
    (function () {
      var d = document.documentElement;
      try {
        var eras = ['2005', '2009', '2014', '2021'];
        var modes = ['light', 'dark'];
        var e = localStorage.getItem('ft-era');
        var m = localStorage.getItem('ft-mode');
        var legacy = localStorage.getItem('theme');
        var era = eras.indexOf(e) >= 0 ? e : '2021';
        var mode = modes.indexOf(m) >= 0 ? m
          : (e == null && m == null && (legacy === 'dark' || legacy === 'light')) ? legacy
          : 'light';
        d.setAttribute('data-theme', era);
        d.setAttribute('data-mode', mode);

        /* Also resolve the icon set before paint. Inline mirror of
           resolveIconSet() in /js/common.js — keep the two in sync. */
        var iconSets = ['outlined', 'rounded', 'filled', 'emoji'];
        var iconAutoMap = { '2005': 'emoji', '2009': 'emoji', '2014': 'filled', '2021': 'rounded' };
        var storedIcons = localStorage.getItem('ft-icons');
        var iconSet = iconSets.indexOf(storedIcons) >= 0 ? storedIcons
          : storedIcons === 'auto' ? iconAutoMap[era]   // `era` already validated above
          : 'outlined';
        d.setAttribute('data-icons', iconSet);
      } catch (_) {
        d.setAttribute('data-theme', '2021');
        d.setAttribute('data-mode', 'light');
        d.setAttribute('data-icons', 'outlined');
      }
    })();
  </script>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu"><i class="icon-menu"></i></button>
      <a href="/" class="logo">File<span class="tube">Tube</span></a>
    </div>
    
    <div class="header-search">
      <div class="search-form">
        <input type="text" id="search-input" class="search-input" placeholder="Search your files..." />
        <button id="search-btn" class="search-btn">Search</button>
      </div>
    </div>

    <div class="header-right">
      <a href="/setup.html" class="btn"><i class="icon-cog"></i> Settings</a>
      <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle light or dark mode"><i class="icon-moon"></i></button>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-section">
        <a href="/" class="sidebar-item active" id="sidebar-home-link">
          <i class="icon-home"></i> Home
        </a>
        <a href="/setup.html" class="sidebar-item">
          <i class="icon-cog"></i> Library Settings
        </a>
      </nav>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Playlists (Folders)</div>
        <div id="sidebar-folders-list">
          <!-- Populated dynamically -->
        </div>
      </div>
    </aside>

    <main class="main-content" id="main-content">
      <!-- Welcome message if no libraries are set up -->
      <div id="welcome-message" class="setup-box" style="display: none; margin: 20px 0;">
        <h2>Welcome to FileTube!</h2>
        <p>It looks like you haven't configured any media folders yet. To start enjoying your local video and audio library, click below to configure folders.</p>
        <a href="/setup.html" class="btn btn-primary" style="padding: 10px 20px;">Configure Media Folders</a>
      </div>

      <div id="library-content">
        <!-- Videos Section -->
        <div class="section-title">
          <span id="videos-section-header">Recently Added</span>
          <div class="section-actions">
            <select id="sort-select" class="sort-select" title="Sort library">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="title-asc">Title (A–Z)</option>
              <option value="title-desc">Title (Z–A)</option>
              <option value="size-desc">Largest first</option>
              <option value="size-asc">Smallest first</option>
              <option value="random">I'm Feeling Lucky (random)</option>
            </select>
            <button class="btn btn-sm" id="shuffle-again-btn" style="font-size: 11px; padding: 4px 8px;" title="Shuffle again" aria-label="Shuffle again" hidden><i class="icon-shuffle"></i> <span class="btn-label">Shuffle again</span></button>
            <button class="btn btn-sm" id="rescan-library-btn" style="font-size: 11px; padding: 4px 8px;" title="Rescan Files" aria-label="Rescan Files"><i class="icon-refresh"></i> <span class="btn-label">Rescan Files</span></button>
          </div>
        </div>

        <div class="video-grid" id="video-grid">
          <!-- Video Cards will be inserted here -->
        </div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
    <a href="/" class="bottom-nav-item" data-nav="home">
      <i class="icon-home"></i>
      <span class="bottom-nav-label">Home</span>
    </a>
    <button type="button" class="bottom-nav-item" data-nav="playlists" id="nav-playlists-btn">
      <i class="icon-folder"></i>
      <span class="bottom-nav-label">Playlists</span>
    </button>
    <button type="button" class="bottom-nav-item" data-nav="theme" id="nav-theme-toggle">
      <i class="icon-moon"></i>
      <span class="bottom-nav-label">Dark</span>
    </button>
    <a href="/setup.html" class="bottom-nav-item" data-nav="settings">
      <i class="icon-cog"></i>
      <span class="bottom-nav-label">Settings</span>
    </a>
  </nav>

  <div class="playlists-sheet-backdrop" id="playlists-backdrop" hidden></div>
  <aside class="playlists-sheet" id="playlists-sheet" hidden aria-label="Playlists">
    <div class="playlists-sheet-header">
      <span>Playlists</span>
      <button type="button" class="playlists-sheet-close" id="playlists-close" aria-label="Close">&times;</button>
    </div>
    <div class="playlists-sheet-list" id="playlists-sheet-list"></div>
  </aside>

  <script src="/js/common.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
