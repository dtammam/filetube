name: Publish Docker Image

# Image tagging strategy (Docker image hygiene):
#   - Push to main            -> `edge` + `sha-<short>`  (bleeding edge, for testing)
#   - Push a version tag v*.* -> `X.Y.Z`, `X.Y`, `X`, `latest`  (a real release)
#
# So `latest` tracks the newest RELEASE (not every commit), users can pin to any
# `X.Y.Z` / `X.Y` / `X`, and Watchtower can follow `latest` (releases) or `edge`
# (main). Cut a release by pushing a tag or publishing a GitHub Release — see
# docs/RELEASING.md.
on:
  push:
    branches: ['main']
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: deantammam/filetube
          # flavor latest=auto (default): a semver tag also updates `latest`.
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
